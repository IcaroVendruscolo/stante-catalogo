<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stante - Catálogo Pessoal</title>
    <style>
        :root {
            --bg-color: #141414;
            --text-color: #ffffff;
            --accent-color: #E50914;
            --card-bg: #222;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 0 4%;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            z-index: 1000;
            transition: background 0.3s;
        }

        header.scrolled {
            background: var(--bg-color);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .logo {
            color: var(--accent-color);
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
        }

        .nav-menu {
            display: none;
            list-style: none;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .nav-menu {
                display: flex;
            }
        }

        .nav-menu a {
            color: #e5e5e5;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
            cursor: pointer;
        }

        .nav-menu a:hover {
            color: #b3b3b3;
        }

        /* Category Dropdown */
        .category-dropdown {
            position: relative;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: rgba(20, 20, 20, 0.95);
            min-width: 200px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5);
            z-index: 1001;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px 0;
            margin-top: 15px;
        }

        .dropdown-menu.active {
            display: block;
        }

        .dropdown-menu a {
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            display: block;
            font-size: 0.9rem;
        }

        .dropdown-menu a:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .search-container {
            display: flex;
            align-items: center;
            position: relative;
            background: transparent;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            padding: 5px;
        }

        .search-container.expanded {
            background: rgba(0, 0, 0, 0.7);
            border-color: #fff;
            padding-right: 10px;
            border-radius: 8px
        }

        .search-input {
            background: transparent;
            border: none;
            color: #fff;
            padding: 0;
            width: 0;
            outline: none;
            transition: width 0.3s ease, padding 0.3s ease;
            font-size: 0.9rem;
        }

        .search-container.expanded .search-input {
            width: 200px;
            padding: 5px 10px;
        }

        .search-icon {
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            width: 30px;
            height: 30px;
        }

        @media (max-width: 600px) {
            .search-container.expanded .search-input {
                width: 120px;
            }
        }

        /* ================================ */
        /* NOVO CARROSSEL ESTILO DISNEY+    */
        /* ================================ */
        
        /* O "Embrulho" invisível que ocupa a tela toda */
        .hero-carousel-wrapper {
            width: 100%;
            overflow: hidden;
            margin-top: 90px;
            padding-top: 20px; /* Espaço para a sombra não cortar */
            padding-bottom: 20px;
            position: relative;
        }

        /* O "Trilho" onde os cards ficam enfileirados */
        .hero-carousel-track {
            display: flex;
            gap: 20px; /* Distância entre um cartão e outro */
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); /* Deslize bem fluido */
        }

        /* O Cartão Individual do Filme */
        .hero-slide {
            position: relative;
            flex: 0 0 92%; /* Cada cartão ocupa 85% da tela, revelando as pontas dos outros */
            flex-shrink: 0;
            max-width: 1600px;
            aspect-ratio: 16 / 7; /* Proporção retangular de cinema para Desktop */
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            padding: 0 4% 6%;
            
            /* Visual do Cartão */
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            
            /* Efeito de filme inativo (meio apagado e um pouco menor) */
            opacity: 0.4;
            transform: scale(0.95);
            transition: all 0.6s ease;
            cursor: pointer;
        }

        /* Efeito de filme ATIVO (Cresce e fica 100% visível) */
        .hero-slide.active {
            opacity: 1;
            transform: scale(1);
            z-index: 2;
            cursor: default;
        }

        /* Responsividade para Banners */
        @media (max-width: 767px) {
            .hero-carousel-wrapper {
                margin-top: 70px;
            }
            .hero-slide {
                flex: 0 0 88%; /* No mobile, revela um tiquinho menos dos vizinhos para dar mais espaço */
                background-image: var(--bg-mobile) !important;
                aspect-ratio: 3 / 4; /* Mantemos o quadrado vertical pro mobile */
                padding: 0 6% 10%;
            }
        }
        @media (min-width: 768px) {
            .hero-slide {
                background-image: var(--bg-desktop) !important;
            }
        }

        /* Degrade no fundo do cartão */
        .hero-slide::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top right, rgba(30, 42, 56, 0.8) 0%, rgba(30, 42, 56, 0.3) 45%, transparent 75%);
            z-index: 1;
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 10;
            max-width: 600px;
            padding-bottom: 20px;
        }

        .hero-title {
            font-size: clamp(1.5rem, 4vw, 2.5rem); /* Letra ajustada pro novo tamanho do cartão */
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-weight: bold;
        }

        .hero-desc {
            font-size: clamp(0.85rem, 1.5vw, 1rem); 
            margin-bottom: 15px;
            line-height: 1.4;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            color: #e5e5e5;
            display: -webkit-box;
            -webkit-line-clamp: 2; /* Mostra no máximo 2 linhas de texto pra não poluir o cartão */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Dots Positioning */
        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            z-index: 30;
            margin-bottom: 40px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dot.active {
            background-color: #fff;
            transform: scale(1.3);
        }

        .btn {
            padding: 8px 20px;
            font-size: 0.9rem;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: #f40612;
            transform: scale(1.05);
        }
        /* Catalog */
        .catalog {
            padding: 20px 0;
            min-height: 50vh;
            position: relative;
            z-index: 5;
            margin-top: -50px;
        }

        .row {
            margin-bottom: 40px;
        }

        .row-title {
            margin: 0 4% 10px;
            font-size: 1.4rem;
            font-weight: bold;
        }

        .row-posters {
            display: flex;
            overflow-x: auto;
            padding: 20px 4%;
            scroll-behavior: smooth;
            gap: 15px;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .row-posters::-webkit-scrollbar {
            display: none;
        }

        .poster {
            flex: 0 0 auto;
            width: 150px;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            object-fit: cover;
            aspect-ratio: 2/3;
            background-color: var(--card-bg);
        }

        .poster:hover {
            transform: scale(1.1);
            z-index: 2;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
        }

        @media (min-width: 768px) {
            .poster {
                width: 200px;
            }
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background-color: var(--bg-color);
            width: 90%;
            max-width: 800px;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            transform: scale(0.8);
            transition: transform 0.3s;
            display: flex;
            flex-direction: column;
            max-height: 90vh;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        @media (min-width: 768px) {
            .modal {
                flex-direction: row;
            }
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        
        .modal-close:hover {
            background: rgba(255,255,255,0.2);
        }

        .modal-poster {
            width: 100%;
            height: 300px;
            object-fit: cover;
            object-position: top;
        }

        @media (min-width: 768px) {
            .modal-poster {
                width: 40%;
                height: auto;
            }
        }

        .modal-info {
            padding: 30px;
            flex: 1;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .modal-meta {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .modal-meta span {
            margin-right: 15px;
        }

        .modal-desc {
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .modal-details p {
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .modal-details strong {
            color: #777;
        }

        .modal-location {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 12px;
            background-color: rgba(229, 9, 20, 0.2);
            border: 1px solid var(--accent-color);
            border-radius: 4px;
            color: var(--accent-color);
            font-weight: bold;
        }

        /* Search Results */
        .search-results-title {
            margin: 100px 4% 20px;
            font-size: 1.5rem;
            display: none;
        }

        .search-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            padding: 0 4% 40px;
            display: none;
        }

        @media (min-width: 768px) {
            .search-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }

        /* Collection Posters */
        .collection-poster {
            flex: 0 0 auto;
            width: 45%; /* Show at least 2 on mobile */
            min-width: 140px;
            border-radius: 9px;
            cursor: pointer;
            transition: transform 0.4s ease;
            object-fit: cover;
            aspect-ratio: 16/9;
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .collection-poster:hover {
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.5);
        }

        @media (min-width: 768px) {
            .collection-poster { width: 350px; }
        }

        /* Collection View */
        .collection-view {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            min-height: 100vh;
            background-color: var(--bg-color);
            z-index: 1500;
            padding-bottom: 50px;
        }

        .collection-hero {
            height: 60vh;
            width: 100%;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding: 0 4% 5%;
        }

        .collection-hero::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, var(--bg-color) 0%, transparent 100%);
        }

        .collection-title-container {
            text-align: center;
            margin: 40px 0;
            position: relative;
            z-index: 10;
        }

        .collection-title {
            font-size: 3rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 4%;
            z-index: 1600;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
        }

        .back-button:hover {
            background: rgba(255,255,255,0.2);
        }

        .search-grid .poster {
            width: 100%;
        }
        
        /* MUDANÇAS PARA MELHORAR A VISUALIZAÇAO NO MOBILE */
        @media (max-width: 767px) {
            /* Aumentar os banners das coleções no mobile */
            .collection-poster {
                width: 70%; /* Os banners ocupam 70% da largura da tela no mobile */
                aspect-ratio: 16/9; /* Mantém a proporção de paisagem */
            }
        }
    </style>
</head>

                cast: "Natalie Portman, Hugo Weaving",
                synopsis: "Um vigilante mascarado inspira uma revolução contra um regime totalitário.",
                location: "Gaveta Studio Ghibli",
                poster: "v de vinganca.jpg"
            },
             {
                id: 170,
                title: "Superman/Batman: Inimigos Públicos",
                category: "DC",
                type: "Filme",
                year: 2009,
                director: "Sam Liu",
                cast: "Kevin Conroy, Tim Daly",
                synopsis: "Superman e Batman unem forças quando se tornam alvos do governo.",
                location: "Gaveta Studio Ghibli",
                poster: "superman batman inimigos publicos.jpg"
            }
        ];

        const categories = [
            "Terror Psicológico", "Slasher", "Sci-Fi", "Comédia", "Romance", "Ação", 
            "Aventura", "Life-Change Movies", "Animações", "Marvel", "DC", "Infantil"
        ];

        const collections = [
            {
                id: 'indiana-jones',
                title: 'Coleção Indiana Jones',
                poster: 'capa indiana jones horizontal.jpg',
                heroImage: 'capa indiana jones horizontal.jpg',
                movieIds: [6, 125, 126, 127]
            },
            {
                id: '007',
                title: 'Coleção 007',
                poster: '007 coleçoes.jpg',
                heroImage: '007 coleçoes.jpg',
                movieIds: [114, 115, 190]
            },
            {
                id: 'star-wars',
                title: 'Coleção Star Wars',
                poster: 'star wars banner coleçao.jpg',
                heroImage: 'star wars banner coleçao.jpg',
                movieIds: [123, 148]
            },
            {
                id: 'batman',
                title: 'Coleção Batman',
                poster: 'batman coleçoes.jpg',
                heroImage: 'batman coleçoes.jpg',
                movieIds: [10, 158, 160, 170]
            },
            {
                id: 'kubrick',
                title: 'Coleção Kubrick',
                poster: 'stanley kubrick coleçoes.jpg',
                heroImage: 'stanley kubrick coleçoes.jpg',
                movieIds: [1, 135, 136, 171]
            },
            {
                id: 'spider-man',
                title: 'Coleção Homem Aranha',
                poster: 'homem aranha coleçao.jpg',
                heroImage: 'homem aranha coleçao.jpg',
                movieIds: [138, 139, 140]
            }
        ];

        let currentFilter = null;
        let currentSlideIndex = 0;
        let carouselInterval;
        const heroMovies = [];

        document.addEventListener('DOMContentLoaded', () => {
            setupCategoryDropdown();
            setupHeroCarousel();
            setupSearch();
            setupScroll();
            renderCatalog();
        });

        function setupCategoryDropdown() {
            const dropdown = document.getElementById('categoryDropdown');
            if (!dropdown) return;
            
            dropdown.innerHTML = ''; // Limpa antes de preencher
            categories.forEach(category => {
                const link = document.createElement('a');
                link.href = '#';
                link.textContent = category;
                link.onclick = (e) => {
                    e.preventDefault();
                    filterByCategory(category);
                    dropdown.classList.remove('active');
                };
                dropdown.appendChild(link);
            });

            // Close dropdown when clicking outside
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.category-dropdown')) {
                    dropdown.classList.remove('active');
                }
            });
        }

        function toggleCategories(e) {
            e.preventDefault();
            e.stopPropagation();
            document.getElementById('categoryDropdown').classList.toggle('active');
        }

        function filterByCategory(category) {
            currentFilter = category;
            // Verifica se a categoria está na string ou dentro do array de categorias do filme
            const filtered = movies.filter(m => 
                Array.isArray(m.category) ? m.category.includes(category) : m.category === category
            );
            
            document.getElementById('heroCarouselWrapper').style.display = 'none';
            document.getElementById('carouselDots').style.display = 'none';
            document.getElementById('searchResultsTitle').style.display = 'block';
            document.getElementById('searchResultsTitle').textContent = category;
            document.getElementById('searchGrid').style.display = 'none';
            document.getElementById('catalog').style.display = 'block';
            
            renderCatalog(filtered);
        }/* ================================ */
        /* JS DO NOVO CARROSSEL DISNEY+     */
        /* ================================ */
        function setupHeroCarousel() {
            const carouselIds = [6, 114, 123, 10, 1, 138]; 
            
            carouselIds.forEach(id => {
                const movie = movies.find(m => m.id === id);
                if (movie) {
                    if (!movie.heroImage) {
                        movie.heroImage = `https://picsum.photos/seed/hero_${movie.id}/1200/600`;
                    }
                    if (!movie.heroImageMobile) {
                        movie.heroImageMobile = movie.heroImage;
                    }
                    heroMovies.push(movie);
                }
            });

            const carouselEl = document.getElementById('heroCarousel');
            const dotsEl = document.getElementById('carouselDots');
            carouselEl.innerHTML = '';
            dotsEl.innerHTML = '';

            heroMovies.forEach((movie, index) => {
                const slide = document.createElement('div');
                slide.className = `hero-slide ${index === 0 ? 'active' : ''}`;
                
                slide.style.setProperty('--bg-desktop', `url("${movie.heroImage}")`);
                slide.style.setProperty('--bg-mobile', `url("${movie.heroImageMobile}")`);
                
                slide.innerHTML = `
                    <div class="hero-content">
                        <h1 class="hero-title">${movie.title}</h1>
                        <p class="hero-desc">${movie.synopsis}</p>
                        <button class="btn btn-primary" onclick='openModalById(${movie.id})'>Mais Informações</button>
                    </div>
                `;
                
                // Se o usuário clicar no filme do lado, o carrossel vai até ele
                slide.onclick = (e) => {
                    if (index !== currentSlideIndex) {
                        e.preventDefault(); 
                        goToSlide(index);
                    }
                };

                carouselEl.appendChild(slide);

                const dot = document.createElement('div');
                dot.className = `dot ${index === 0 ? 'active' : ''}`;
                dot.onclick = () => goToSlide(index);
                dotsEl.appendChild(dot);
            });

            window.addEventListener('resize', updateCarouselPosition);
            setTimeout(updateCarouselPosition, 100);
            startCarousel();
        }

        // Função do botão "Mais informações"
        function openModalById(id) {
            const movie = movies.find(m => m.id === id);
            if (movie) openModal(movie);
        }

        // A Matemática que centraliza o card e mostra as pontas
        function updateCarouselPosition() {
            const track = document.getElementById('heroCarousel');
            const slides = document.querySelectorAll('.hero-slide');
            if (slides.length === 0) return;

            const activeSlide = slides[currentSlideIndex];
            const wrapper = document.getElementById('heroCarouselWrapper');

            const offsetLeft = activeSlide.offsetLeft;
            const centerOffset = (wrapper.clientWidth - activeSlide.offsetWidth) / 2;
            const finalPosition = offsetLeft - centerOffset;

            track.style.transform = `translateX(-${finalPosition}px)`;
        }

        function updateDotsAndSlides() {
            const dots = document.querySelectorAll('.dot');
            const slides = document.querySelectorAll('.hero-slide');

            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentSlideIndex);
            });

            slides.forEach((slide, index) => {
                slide.classList.toggle('active', index === currentSlideIndex);
            });
        }

        function goToSlide(index) {
            if (index === currentSlideIndex) return;
            currentSlideIndex = index;
            updateDotsAndSlides();
            updateCarouselPosition();
            startCarousel(); // Reseta o timer de 8s
        }

        function nextSlide() {
            const slides = document.querySelectorAll('.hero-slide');
            if (slides.length <= 1) return;
            currentSlideIndex = (currentSlideIndex + 1) % slides.length;
            goToSlide(currentSlideIndex);
        }

        function startCarousel() {
            if (carouselInterval) clearInterval(carouselInterval);
            carouselInterval = setInterval(nextSlide, 5000); // 5s
        }

        function renderCatalog(filteredMovies = movies) {
            const catalogEl = document.getElementById('catalog');
            if (!catalogEl) return;
            catalogEl.innerHTML = '';
            
            // Only show Destaques and Collections on the main view (no filter active)
            if (!currentFilter && filteredMovies === movies) {
                // 1. Destaques
                const featuredMovies = movies.filter(m => m.featured);
                if (featuredMovies.length > 0) {
                    const row = document.createElement('div');
                    row.className = 'row';
                    row.innerHTML = `<h2 class="row-title">Destaques</h2>`;
                    
                    const postersContainer = document.createElement('div');
                    postersContainer.className = 'row-posters';
                    
                    featuredMovies.forEach(movie => {
                        const img = document.createElement('img');
                        img.className = 'poster';
                        img.src = movie.poster;
                        img.alt = movie.title;
                        img.onclick = () => openModal(movie);
                        postersContainer.appendChild(img);
                    });
                    
                    row.appendChild(postersContainer);
                    catalogEl.appendChild(row);
                }

                // 2. Coleções
                const collRow = document.createElement('div');
                collRow.className = 'row';
                // User said: "Essas coleçoes nao serao categorias em si, ou seja, nao terao um titulo como: Coleçoes"
                
                const collContainer = document.createElement('div');
                collContainer.className = 'row-posters';
                
                collections.forEach(coll => {
                    const img = document.createElement('img');
                    img.className = 'collection-poster';
                    img.src = coll.poster;
                    img.alt = coll.title;
                    img.onclick = () => openCollectionView(coll);
                    collContainer.appendChild(img);
                });
                
                collRow.appendChild(collContainer);
                catalogEl.appendChild(collRow);
            }

            // 3. Categorias
            categories.forEach(category => {
                const isCategoryFilter = currentFilter && categories.includes(currentFilter);
                if (isCategoryFilter && category !== currentFilter) {
                    return;
                }

                const categoryMovies = filteredMovies.filter(m => 
                    Array.isArray(m.category) ? m.category.includes(category) : m.category === category
                );

                if (categoryMovies.length === 0) return;
                
                const row = document.createElement('div');
                row.className = 'row';
                
                if (!isCategoryFilter) {
                    row.innerHTML = `<h2 class="row-title">${category}</h2>`;
                }

                // CORREÇÃO AQUI: Criando um novo container para a categoria atual
                const categoryPostersContainer = document.createElement('div');
                categoryPostersContainer.className = 'row-posters';

                categoryMovies.forEach(movie => {
                    const img = document.createElement('img');
                    img.className = 'poster';
                    img.src = movie.poster;
                    img.alt = movie.title;
                    img.loading = 'lazy';
                    img.referrerPolicy = 'no-referrer';
                    img.onclick = () => openModal(movie);
                    categoryPostersContainer.appendChild(img);
                });
                
                row.appendChild(categoryPostersContainer);
                catalogEl.appendChild(row);
            });
        }


        function toggleSearch() {
            const container = document.getElementById('searchContainer');
            const input = document.getElementById('searchInput');
            container.classList.toggle('expanded');
            if (container.classList.contains('expanded')) {
                input.focus();
            }
        }

        function filterByType(type) {
            currentFilter = type;
            const filtered = movies.filter(m => m.type === type);
            
            document.getElementById('heroCarouselWrapper').style.display = 'none';
            document.getElementById('carouselDots').style.display = 'none';
            document.getElementById('searchResultsTitle').style.display = 'block';
            document.getElementById('searchResultsTitle').textContent = type === 'Filme' ? 'Filmes' : 'Séries';
            document.getElementById('searchGrid').style.display = 'none';
            document.getElementById('catalog').style.display = 'block';
            
            renderCatalog(filtered);
        }

        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            const catalogEl = document.getElementById('catalog');
            const heroEl = document.querySelector('heroCarouselWrapper');
            const searchResultsTitle = document.getElementById('searchResultsTitle');
            const searchGrid = document.getElementById('searchGrid');
            
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                
                if (query.length > 0) {
                    heroEl.style.display = 'none';
                    document.getElementById('carouselDots').style.display = 'none';
                    catalogEl.style.display = 'none';
                    searchResultsTitle.style.display = 'block';
                    searchGrid.style.display = 'grid';
                    
                    const results = movies.filter(m => m.title.toLowerCase().includes(query));
                    
                    searchGrid.innerHTML = '';
                    if (results.length > 0) {
                        searchResultsTitle.textContent = `Resultados para "${query}"`;
                        results.forEach(movie => {
                            const img = document.createElement('img');
                            img.className = 'poster';
                            img.src = movie.poster;
                            img.alt = movie.title;
                            img.referrerPolicy = 'no-referrer';
                            img.onclick = () => openModal(movie);
                            searchGrid.appendChild(img);
                        });
                    } else {
                        searchResultsTitle.textContent = `Nenhum resultado encontrado para "${query}"`;
                    }
                } else {
                    // CORREÇÃO: Verificando que tipo de filtro estava ativo antes da busca
                    if (currentFilter) {
                       if (categories.includes(currentFilter)) {
                           filterByCategory(currentFilter);
                       } else {
                        filterByType(currentFilter);
                       }
                    } else {
                        resetSearch();
                    }
                }
            });
        }

        function resetSearch() {
            currentFilter = null;
            const searchInput = document.getElementById('searchInput');
            searchInput.value = '';
            document.getElementById('searchContainer').classList.remove('expanded');
            
            document.getElementById('heroCarouselWrapper').style.display = 'block';
            document.getElementById('carouselDots').style.display = 'flex';
            document.getElementById('catalog').style.display = 'block';
            document.getElementById('searchResultsTitle').style.display = 'none';
            document.getElementById('searchGrid').style.display = 'none';
            
            renderCatalog(movies);
        }

        function openModal(movie) {
            const modal = document.getElementById('modal');
            const poster = document.getElementById('modalPoster');
            poster.src = movie.poster;
            poster.referrerPolicy = 'no-referrer';
            
            document.getElementById('modalTitle').textContent = movie.title;
            document.getElementById('modalYear').textContent = movie.year;
            
            const catDisplay = Array.isArray(movie.category) ? movie.category.join(', ') : movie.category;
            document.getElementById('modalCategory').textContent = catDisplay;
            
            document.getElementById('modalDesc').textContent = movie.synopsis;
            document.getElementById('modalDirector').textContent = movie.director;
            document.getElementById('modalCast').textContent = movie.cast;
            document.getElementById('modalLocation').textContent = `📍 ${movie.location}`;
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }


        function openCollectionView(collection) {
            const view = document.getElementById('collectionView');
            const hero = document.getElementById('collectionHero');
            const title = document.getElementById('collectionTitle');
            const grid = document.getElementById('collectionGrid');
            const backBtn = document.getElementById('backToMain');

            // Hide main content
            document.getElementById('heroCarouselWrapper').style.display = 'none';
            document.getElementById('carouselDots').style.display = 'none';
            document.getElementById('catalog').style.display = 'none';
            document.getElementById('searchResultsTitle').style.display = 'none';
            document.getElementById('searchGrid').style.display = 'none';

            // Setup Collection View
            hero.style.backgroundImage = `url("${collection.heroImage}")`;
            title.textContent = collection.title;
            
            grid.innerHTML = '';
            collection.movieIds.forEach(id => {
                const movie = movies.find(m => m.id === id);
                if (movie) {
                    const img = document.createElement('img');
                    img.className = 'poster';
                    img.src = movie.poster;
                    img.alt = movie.title;
                    img.onclick = () => openModal(movie);
                    grid.appendChild(img);
                }
            });

            view.style.display = 'block';
            backBtn.style.display = 'flex';
            window.scrollTo(0, 0);
        }

        function closeCollectionView() {
            document.getElementById('collectionView').style.display = 'none';
            document.getElementById('backToMain').style.display = 'none';
            resetSearch();
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Close modal on outside click
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modal')) {
                closeModal();
            }
        });

        function setupScroll() {
            window.addEventListener('scroll', () => {
                const header = document.querySelector('header');
                if (window.scrollY > 50) {
                    header.classList.add('scrolled');
                } else {
                    header.classList.remove('scrolled');
                }
            });
        }
    </script>
</body>
</html>
